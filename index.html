    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The outer clipping window */
        .carousel-wrapper {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        /* The inner track — holds two copies of the strip for seamless loop */
        .carousel-track {
            display: flex;
            flex-direction: column;
            width: 100%;
            will-change: transform;
        }

        /* Each strip is one full set of images */
        .carousel-strip {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .carousel-strip img,
        .carousel-strip a {
            width: 100%;
            display: block;
        }

        .carousel-strip img {
            height: auto;
            object-fit: cover;
            /* Prevents sub-pixel gaps */
            vertical-align: bottom;
            margin-bottom: -1px;
        }

        .carousel-strip a img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: -1px;
            vertical-align: bottom;
        }

        /* Fixed overlay text */
        .section-home {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .paragraph-4 {
            color: #fff;
            font-size: clamp(2rem, 10vw, 6rem);
            font-family: 'Inconsolata', monospace;
            text-transform: uppercase;
            text-align: center;
            mix-blend-mode: difference;
        }

        .text-span-13 {
            font-style: italic;
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_01.png');
            background-size: 200px 200px;
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        /* Bottom menu */
        .bottom-menu-2 {
            position: fixed;
            bottom: 40px;
            width: 100%;
            z-index: 20;
            display: flex;
            justify-content: center;
        }

        .div-block-49 {

        }

        .link-menu {

            font-family: 'Inconsolata', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .link-menu:hover {
            opacity: 1;
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/Observer.min.js"></script>

    <script>
        const track = document.getElementById('track');
        const strips = track.querySelectorAll('.carousel-strip');

        // Wait for images to load so we can measure strip height correctly
        window.addEventListener('load', init);
        // Also init immediately in case load already fired
        if (document.readyState === 'complete') init();

        function init() {
            const stripHeight = strips[0].offsetHeight;

            // Base auto-scroll speed: px per second
            const BASE_SPEED = 120;
            let currentY = 0;
            let velocity = 0; // extra scroll velocity from user input
            let lastTime = null;

            function animate(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const delta = (timestamp - lastTime) / 1000; // seconds
                lastTime = timestamp;

                // Decay user-added velocity
                velocity *= 0.92;

                // Total movement this frame
                const move = (BASE_SPEED + velocity) * delta;
                currentY -= move;

                // Seamless loop: once strip A has fully scrolled off top,
                // reset by one strip height so strip B takes its place
                if (Math.abs(currentY) >= stripHeight) {
                    currentY += stripHeight;
                }

                track.style.transform = `translateY(${currentY}px)`;
                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);

            // Scroll / touch speed boost
            let wheelTimeout;
            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                // Positive deltaY = scroll down = we move images UP faster
                velocity += e.deltaY * 0.8;
                velocity = Math.max(-800, Math.min(800, velocity));
            }, { passive: false });

            // Touch support
            let touchStartY = 0;
            let lastTouchY = 0;
            window.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
                lastTouchY = touchStartY;
            });
            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const dy = lastTouchY - e.touches[0].clientY;
                velocity += dy * 4;
                velocity = Math.max(-800, Math.min(800, velocity));
                lastTouchY = e.touches[0].clientY;
            }, { passive: false });
        }
    </script>
